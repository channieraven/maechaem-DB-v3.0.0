# Netlify build configuration for Mae Chaem Agroforestry DB
# Next.js app deployed via Netlify's built-in Next.js support.
#
# ⚠️  REQUIRED environment variables — set ALL of these in the Netlify
#     dashboard under Site settings → Environment variables.
#     Missing any of the NEXT_PUBLIC_* keys will cause a
#     "Missing publishableKey" error at runtime.
#
#   DATABASE_URL                        — Neon connection string
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY   — Clerk publishable key (pk_live_… / pk_test_…)
#   CLERK_SECRET_KEY                    — Clerk secret key (sk_live_… / sk_test_…)
#   CLERK_WEBHOOK_SECRET                — Svix signing secret for webhooks
#   NEXT_PUBLIC_CLERK_SIGN_IN_URL       — /sign-in
#   NEXT_PUBLIC_CLERK_SIGN_UP_URL       — /sign-up
#   NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL — /dashboard
#   NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL — /dashboard

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
